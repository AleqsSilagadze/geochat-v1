<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>GeoChat — Live</title>
    <link rel="stylesheet" href="main_style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="toast-container"></div>

<header class="main-header">
    <div class="logo-small">Geo<span>Chat</span></div>
    <div class="online-badge">
        <span class="dot"></span>
        <span id="user-count">0</span>&nbsp;Online
    </div>
    <div></div>
</header>

<main class="chat-container">
    <div class="video-grid">

        <!-- My video -->
        <div class="video-box">
            <div class="video-label" id="my-name-display">შენ</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>

        <!-- Partner video -->
        <div class="video-box" id="remote-video-box">
            <div class="video-label" id="partner-name-display">Partner</div>
            <video id="remoteVideo" autoplay playsinline></video>

            <!-- Loading / Waiting overlay -->
            <div class="loader-overlay" id="loader" data-mode="loading">
                <div class="loader-inner">
                    <!-- Concentric pulse rings (visible only in waiting mode) -->
                    <div class="wait-rings">
                        <div class="ring ring-1"></div>
                        <div class="ring ring-2"></div>
                        <div class="ring ring-3"></div>
                        <div class="ring-dot"></div>
                    </div>
                    <div id="loader-text" data-glitch="Loading.." class="glitch">Searching</div>
                    <div class="scan-line"></div>
                </div>
            </div>

            <!-- Stopped / Start overlay -->
            <div class="stopped-overlay" id="stopped-overlay">
                <div class="stopped-content">
                    <span class="stopped-icon">⏸</span>
                    <div class="stopped-title">Search Paused</div>
                    <div class="stopped-hint">Press <b>START</b> to find someone</div>
                </div>
                <div class="particle p1"></div>
                <div class="particle p2"></div>
                <div class="particle p3"></div>
                <div class="particle p4"></div>
                <div class="particle p5"></div>
            </div>
        </div>
    </div>

    <div class="chat-sidebar">
        <div class="chat-sidebar-header">Chat</div>
        <div class="messages" id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" maxlength="200" autocomplete="off"
                   placeholder="Type a message...">
            <button id="send-btn">➤</button>
        </div>
    </div>
</main>

<footer class="controls">
    <button class="uiverse-btn btn-toggle start-mode" id="stop-btn" data-state="start">START</button>
    <button class="uiverse-btn next" id="next-btn">შემდეგი</button>
    <button class="uiverse-btn report" id="report-btn">რეპორტი</button>
</footer>

<script src="script.js"></script>
</body>
</html>
